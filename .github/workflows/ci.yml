name: CI

on:
  push:
    branches: [master, develop]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: api

jobs:
  # --- Job 1 : qualité (lint + format), en parallèle des tests ---
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  # --- Job 2 : tests (unitaires + intégration vraie DB) sur 2 versions Node ---
  test:
    name: Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: shoplite
          POSTGRES_USER: shoplite
          POSTGRES_PASSWORD: shoplite_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shoplite"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RUN_INTEGRATION: "1"
      DATABASE_URL: postgres://shoplite:shoplite_password@localhost:5432/shoplite
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - name: Initialise le schéma et les données
        run: psql "$DATABASE_URL" -f ../database/init.sql
      - name: Tests + couverture (échec sous 80%)
        run: npm run test:coverage
      - name: Publie le rapport de couverture
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage
          if-no-files-found: warn

  # --- Job 3 : build Docker, dépend des tests verts ---
  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build des images (compose)
        working-directory: .
        run: docker compose build

  # --- Job 4 : sécurité (Trivy + npm audit + npm outdated) ---
  security:
    name: Sécurité (Trivy + npm audit)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Build de l'image API à scanner
        working-directory: .
        run: docker build -t shoplite-api:ci ./api
      - name: Scan Trivy de l'image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: shoplite-api:ci
          format: table
          severity: HIGH,CRITICAL
          exit-code: "0" # pédagogique : on affiche sans bloquer
      - name: Audit des dépendances npm
        run: npm audit --audit-level=high || true
      - name: Dépendances obsolètes
        run: npm outdated || true
