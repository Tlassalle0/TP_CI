# Stack ShopLite locale (dev). Override staging : docker-compose.staging.yml
# Réglages communs de logging (rotation pour éviter des logs qui grossissent sans fin).
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:16-alpine
    container_name: shoplite_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shoplite}
      POSTGRES_USER: ${POSTGRES_USER:-shoplite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shoplite_password}
    volumes:
      - shoplite_pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    networks:
      - shoplite_net

  api:
    build: ./api
    container_name: shoplite_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-shoplite}:${POSTGRES_PASSWORD:-shoplite_password}@db:5432/${POSTGRES_DB:-shoplite}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_VERSION: ${APP_VERSION:-dev}
    depends_on:
      db:
        condition: service_healthy
    # Readiness applicative : le service n'est "healthy" que si /ready répond.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 256M
    networks:
      - shoplite_net

  frontend:
    build: ./frontend
    container_name: shoplite_frontend
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
    networks:
      - shoplite_net

  proxy:
    image: nginx:1.27-alpine
    container_name: shoplite_proxy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
    networks:
      - shoplite_net

volumes:
  shoplite_pgdata:

networks:
  shoplite_net:
    driver: bridge
